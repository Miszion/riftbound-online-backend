name: Riftbound Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --coverage --ci --forceExit

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/server.js || (echo "dist/server.js missing" && exit 1)
          echo "Build output verified"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t riftbound-backend:ci-${{ github.sha }} .

      - name: Test health check endpoint
        run: |
          docker run -d --name riftbound-test -p 3000:3000 \
            -e NODE_ENV=test \
            -e LOG_LEVEL=error \
            riftbound-backend:ci-${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/health || (docker logs riftbound-test && exit 1)
          docker stop riftbound-test
